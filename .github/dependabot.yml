# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Gradle dependencies (libs.versions.toml)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
    labels:
      - "dependencies"
      - "gradle"
    reviewers:
      - "aguilaj10"
    groups:
      # Group Kotlin-related updates together
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "kotlin*"
      # Group Compose updates together
      compose:
        patterns:
          - "org.jetbrains.compose*"
          - "compose*"
      # Group testing dependencies
      testing:
        patterns:
          - "org.testcontainers*"
          - "*test*"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
