name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      
      - name: Grant execute permission for gradlew (Unix)
        if: runner.os != 'Windows'
        run: chmod +x gradlew
      
      - name: Build and Test
        run: ./gradlew detekt spotlessCheck build --no-daemon --stacktrace
      
      - name: Package for macOS (DMG)
        if: runner.os == 'macOS'
        run: ./gradlew packageDmg --no-daemon --stacktrace || ./gradlew assembleDist distZip --no-daemon --stacktrace
        continue-on-error: false
      
      - name: Package for Windows (MSI)
        if: runner.os == 'Windows'
        run: ./gradlew packageMsi --no-daemon --stacktrace || (./gradlew assembleDist distZip --no-daemon --stacktrace && exit 0)
        continue-on-error: false
      
      - name: Package for Linux (DEB)
        if: runner.os == 'Linux'
        run: ./gradlew packageDeb --no-daemon --stacktrace || ./gradlew assembleDist distZip distTar --no-daemon --stacktrace
        continue-on-error: false
      
      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: db-eagle-macos
          path: |
            app/build/compose/binaries/main/dmg/*.dmg
            app/build/distributions/*.zip
          if-no-files-found: ignore
          retention-days: 7
      
      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: db-eagle-windows
          path: |
            app/build/compose/binaries/main/msi/*.msi
            app/build/distributions/*.zip
          if-no-files-found: ignore
          retention-days: 7
      
      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: db-eagle-linux
          path: |
            app/build/compose/binaries/main/deb/*.deb
            app/build/distributions/*.zip
            app/build/distributions/*.tar
          if-no-files-found: ignore
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
